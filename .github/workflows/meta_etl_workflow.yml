# .github/workflows/meta_etl.yml
# ============================================================
# Roda o ETL todo dia às 06:00 UTC (03:00 Brasília)
# Também pode ser disparado manualmente pelo GitHub Actions
# ============================================================

name: Meta Ads ETL

on:
  schedule:
    - cron: '0 6 * * *'   # diário 06h UTC = 03h Brasília
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Quantos dias buscar'
        required: false
        default: '7'

jobs:
  etl-part1:
    name: ETL dias 1-7
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python meta_etl.py 7
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID:   ${{ secrets.META_AD_ACCOUNT_ID }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  etl-part2:
    name: ETL dias 8-30
    needs: etl-part1
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: sleep 600  # espera 10 minutos
      - run: python meta_etl.py 30
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID:   ${{ secrets.META_AD_ACCOUNT_ID }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  etl-part3:
    name: ETL dias 31-180
    needs: etl-part2
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: sleep 600  # espera 10 minutos
      - run: python meta_etl.py 180
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID:   ${{ secrets.META_AD_ACCOUNT_ID }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
